server {
    listen 80 default_server;
    server_name _;

    # ACME challenge (для будущего certbot)
    location /.well-known/acme-challenge/ {
        root /var/www;
    }

    # Health-check без проксирования
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # Статика: семплы голосов, аудио для VoxEngine, сгенерированные mp3
    location /voices/ {
        alias /var/www/voices/;
        autoindex on;
        types { audio/mpeg mp3; audio/wav wav; }
        default_type audio/mpeg;
    }

    # TTS audio — публичный доступ для Voximplant playback
    location /tts-audio/ {
        alias /srv/tts-audio/;
        autoindex off;
        types { audio/mpeg mp3; }
        default_type audio/mpeg;
        add_header Cache-Control "public, max-age=3600";
    }

    # Локальное хранилище записей звонков (Cloudinary fallback).
    # Защищено basic-auth: htpasswd-файл создаётся на VPS через
    # `infra/scripts/recordings_htpasswd.sh`.
    # Если htpasswd-файла нет — nginx 500 Internal Server Error,
    # т.е. без auth-файла раздача не работает (защита от случайной утечки).
    location /recordings/ {
        alias /var/www/recordings/;
        autoindex off;
        types { audio/mpeg mp3; audio/wav wav; }
        default_type audio/mpeg;
        auth_basic "VoiceAgent recordings";
        auth_basic_user_file /etc/nginx/recordings.htpasswd;
    }

    # Все API/webhooks/UI идут на backend
    location / {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        client_max_body_size 50M;
    }
}
