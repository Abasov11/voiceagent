{% extends "_base.html" %}
{% block title %}Вход — Олимп{% endblock %}
{% block body_noauth %}
<div class="min-h-screen bg-gradient-to-br from-brand-600 via-brand-700 to-brand-900 flex items-center justify-center p-4">
  <div class="w-full max-w-sm">
    <div class="bg-white rounded-2xl shadow-xl p-8">
      <div class="text-center mb-8">
        <h1 class="text-2xl font-bold text-slate-900">Олимп</h1>
        <p class="text-sm text-slate-500 mt-1">Войдите в панель управления</p>
      </div>
      {% if error %}
      <div class="mb-4 p-3 bg-red-50 border border-red-200 rounded-lg text-sm text-red-700">{{ error }}</div>
      {% endif %}
      <form method="post" action="/dashboard/login" class="space-y-4">
        <div>
          <label for="email" class="block text-sm font-medium text-slate-700 mb-1.5">Email</label>
          <input type="email" id="email" name="email" required autofocus
            class="w-full px-3.5 py-2.5 bg-slate-50 border border-slate-200 rounded-lg text-sm focus:bg-white focus:border-brand-500 focus:ring-2 focus:ring-brand-500/20 transition-colors"
            placeholder="you@company.kz">
        </div>
        <div>
          <label for="password" class="block text-sm font-medium text-slate-700 mb-1.5">Пароль</label>
          <input type="password" id="password" name="password" required
            class="w-full px-3.5 py-2.5 bg-slate-50 border border-slate-200 rounded-lg text-sm focus:bg-white focus:border-brand-500 focus:ring-2 focus:ring-brand-500/20 transition-colors">
        </div>
        <button type="submit" class="cursor-pointer w-full py-2.5 bg-brand-600 hover:bg-brand-700 text-white font-medium rounded-lg text-sm transition-colors focus:ring-2 focus:ring-brand-500/50 focus:ring-offset-2">
          Войти
        </button>
      </form>
    </div>
    <p class="text-center text-xs text-brand-200 mt-6">voiceagent.example.com</p>
  </div>
</div>
{% endblock %}
